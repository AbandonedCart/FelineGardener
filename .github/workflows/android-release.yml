name: Android Build and Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

  build-and-publish-release:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate signing secrets
        run: |
          if [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_ALIAS}" ]; then
            echo "Missing required secrets KEYSTORE_PASSWORD and/or KEY_ALIAS."
            exit 1
          fi

      - name: Build signed release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Compute release metadata
        id: release_meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "apk_name=FelineGardener-${SHORT_SHA}.apk" >> "${GITHUB_OUTPUT}"

      - name: Rename release APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/${{ steps.release_meta.outputs.apk_name }}"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ steps.release_meta.outputs.short_sha }}
          path: app/build/outputs/apk/release/${{ steps.release_meta.outputs.apk_name }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: Release ${{ steps.release_meta.outputs.tag_name }}
          files: app/build/outputs/apk/release/${{ steps.release_meta.outputs.apk_name }}
          generate_release_notes: true
